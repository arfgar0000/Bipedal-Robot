; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; =========================
; Base configuration
; =========================
[env:base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.flash_size = 16MB

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=3

lib_deps =
  knolleary/PubSubClient
  adafruit/Adafruit NeoPixel
  https://github.com/sparkfun/SparkFun_BNO08x_Arduino_Library.git
  https://github.com/odriverobotics/ODriveArduino.git

; =========================
; IMU Environment (uses IMU only)
; =========================
[env:imu]
extends = env:base
build_src_filter =
  +<features/imu/>
  +<targets/imu/>

[env:double_pendulum]
extends = env:base
build_src_filter =
  +<targets/double_pendulum/>

[env:canbus_testing_serial_node3_node4]
extends = env:base
build_src_filter =
  +<targets/canbus_testing_serial_node3_node4/>

